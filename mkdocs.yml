          - SQL beyond SELECT: data-engineering/advanced/sql.md
          - Distributed systems: data-engineering/advanced/distributed-systems.md
          - Spark: data-engineering/advanced/spark.md
          - Streaming: data-engineering/advanced/streaming.md
          - dbt: data-engineering/advanced/dbt.md
          - Data contracts: data-engineering/advanced/data-contracts.md
          - Security & governance: data-engineering/advanced/security.md
          - Infrastructure as code: data-engineering/advanced/iac.md
          - FinOps: data-engineering/advanced/finops.md
          - Performance deep-dive: data-engineering/advanced/performance.md
          - Concurrency: data-engineering/advanced/concurrency.md
          - Data quality: data-engineering/advanced/data-quality.md
          - Catalogs & lineage: data-engineering/advanced/catalogs.md
          - Real-time analytics: data-engineering/advanced/real-time.md
          - Ingestion patterns: data-engineering/advanced/ingestion.md
          - Event-driven architectures: data-engineering/advanced/event-driven.md
          - MLOps overlap: data-engineering/advanced/mlops.md
          - Disaster recovery: data-engineering/advanced/disaster-recovery.md
