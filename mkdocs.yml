      - The five pillars: data-engineering/five-pillars.md
      - DWI case study: data-engineering/dwi-case-study.md
      - Concepts in depth: data-engineering/concepts.md
      - Tooling landscape: data-engineering/tooling.md
      - Reliability & operations: data-engineering/reliability.md
      - Performance & scale: data-engineering/performance.md
      - Testing pipelines: data-engineering/testing.md
      - CI/CD: data-engineering/cicd.md
